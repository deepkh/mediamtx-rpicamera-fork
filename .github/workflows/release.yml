name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_arm64:
    name: build arm64 binary
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU for ARM64 containers
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build with build.sh inside Debian 13 ARM64
        run: |
          docker run --rm \
            --platform linux/arm64 \
            -v "${GITHUB_WORKSPACE}:/src" \
            -w /src \
            debian:trixie-slim \
            bash -lc './build.sh --clean'

      - name: Package release assets
        run: |
          mkdir -p release
          cp prefix/bin/mtxrpicam release/mtxrpicam_linux_arm64
          tar -C release -czf release/mtxrpicam_linux_arm64.tar.gz mtxrpicam_linux_arm64
          sha256sum release/mtxrpicam_linux_arm64 release/mtxrpicam_linux_arm64.tar.gz > release/sha256sum.txt

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: release/*
          if-no-files-found: error

  github_release:
    name: publish github release
    needs: build_arm64
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'

    steps:
      - name: Download workflow artifacts
        uses: actions/download-artifact@v5
        with:
          name: release-assets
          path: release

      - name: Publish release assets
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            release/mtxrpicam_linux_arm64
            release/mtxrpicam_linux_arm64.tar.gz
            release/sha256sum.txt
